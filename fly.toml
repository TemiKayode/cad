# Fly.io config (Phase 19.2) -- the fastest path to a public HTTPS URL.
# See docs/deployment.md's "Fly.io" section for the full `fly secrets set`
# / `fly volumes create` / `fly deploy` sequence.
#
# App name/region come from the real `fly launch` run on 2026-07-05
# (PR #1, "New files from Fly.io Launch"); everything else keeps the
# Phase 19 config, deliberately over the generated defaults:
#   - internal_port 8000 (the app's actual port; the generated file said 8080)
#   - auto_stop OFF + min_machines_running 1: WebSocket connections are
#     long-lived and often idle between edits -- scale-to-zero would kill
#     the machine out from under a connected room. Collaboration is the
#     whole point of this app, so one always-on machine is the correct
#     trade-off, not a cost optimization to fight later.
#   - a [[mounts]] volume: without it the SQLite file dies with the machine
#     (create it once: `fly volumes create crdt_cad_data --region iad`).
#
# Honesty note: this merged config has still not itself been deployed
# (`fly deploy`) -- validate on first deploy. CRDT_CAD_SECRET is set via
# `fly secrets set`, never in [env] (this file is committed and public).
app = "cad-hxpczw"
primary_region = "iad"

[build]

[env]
  CRDT_CAD_DB_PATH = "/data/crdt_cad.db"

[[mounts]]
  source = "crdt_cad_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
