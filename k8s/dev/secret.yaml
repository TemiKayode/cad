# Dev-only credentials matching k8s/dev/postgres.yaml's POSTGRES_USER/
# POSTGRES_PASSWORD/POSTGRES_DB above -- committed in plaintext only
# because this Postgres instance is itself throwaway/local-validation-only
# (see postgres.yaml). A real deployment creates this Secret out-of-band
# (`kubectl create secret generic crdt-cad-database --from-literal=url=...`)
# and never commits it -- see k8s/README.md.
apiVersion: v1
kind: Secret
metadata:
  name: crdt-cad-database
type: Opaque
stringData:
  url: postgresql://crdt_cad:crdt_cad_dev_only@crdt-cad-postgres:5432/crdt_cad
