apiVersion: apps/v1
kind: Deployment
metadata:
  name: crdt-cad
  labels:
    app: crdt-cad
spec:
  # Safe default: replicas: 1, local SQLite file, no shared broker -- this
  # is the zero-config path and always works. Bumping replicas > 1 is only
  # correct once CRDT_CAD_DATABASE_URL and CRDT_CAD_REDIS_URL are both set
  # below (uncomment the env entries and the `replicas`/`strategy` lines
  # further down) -- see k8s/README.md for exactly what each one buys you
  # and what was/wasn't live-verified.
  replicas: 1
  strategy:
    type: Recreate  # avoids two pods briefly both holding the SQLite file
    # type: RollingUpdate  # safe instead, once Postgres+Redis are configured
  selector:
    matchLabels:
      app: crdt-cad
  template:
    metadata:
      labels:
        app: crdt-cad
    spec:
      containers:
        - name: crdt-cad
          # Default: a locally-built image (`docker build -t crdt-cad:latest .`
          # then `kind load docker-image crdt-cad:latest`) -- the exact
          # configuration Phase 18 validated and CI's k8s-smoke job re-validates
          # on every push, with zero registry access needed. Once a `v*` release
          # tag has been pushed (publishing via .github/workflows/release.yml),
          # a real cluster can pull the published image instead:
          #   image: ghcr.io/temikayode/crdt-cad:latest
          #   imagePullPolicy: Always
          image: crdt-cad:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CRDT_CAD_DB_PATH
              value: /data/crdt_cad.db
            # Uncomment both of these (and remove CRDT_CAD_DB_PATH above,
            # and the PVC/volumeMount below) to run replicas > 1 -- see
            # k8s/README.md's "Scaling to replicas > 1" section.
            # - name: CRDT_CAD_DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: crdt-cad-database
            #       key: url
            # - name: CRDT_CAD_REDIS_URL
            #   value: redis://crdt-cad-redis:6379/0
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: crdt-cad-data
