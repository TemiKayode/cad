# Phase 19.6: publish the container image to GitHub Container Registry on
# every version tag (`git tag v0.1.0 && git push origin v0.1.0`). Uses the
# workflow's own GITHUB_TOKEN -- no extra secret to configure; the only
# one-time setup is that the resulting package (ghcr.io/<owner>/crdt-cad)
# must be made public in the GitHub UI if anonymous `docker pull` should
# work (packages default to private on first publish).
#
# Deliberately a separate workflow from ci.yml: CI runs on every push and
# never publishes anything; this runs only on tags and only publishes.
name: Release image

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: build + push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/crdt-cad
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
