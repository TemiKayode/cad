name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
      - run: ruff check .

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: playwright install --with-deps chromium
      - run: pytest tests/e2e -m e2e -v

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t crdt-cad:ci .

  k8s-smoke:
    name: k8s smoke test (kind, Mode A)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e . websockets
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t crdt-cad:latest .
      - uses: helm/kind-action@v1
        with:
          cluster_name: crdt-cad-ci
      - run: kind load docker-image crdt-cad:latest --name crdt-cad-ci
      - run: kubectl apply -k k8s/
      - run: kubectl rollout status deployment/crdt-cad --timeout=90s
      - run: |
          kubectl port-forward svc/crdt-cad 8080:80 &
          sleep 3
          PYTHONPATH=src python scripts/k8s_smoke_test.py http://127.0.0.1:8080
      - if: failure()
        run: kubectl describe pod -l app=crdt-cad; kubectl logs -l app=crdt-cad --tail=100
