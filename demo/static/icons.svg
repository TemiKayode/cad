<svg xmlns="http://www.w3.org/2000/svg">
  <!-- No `style="display:none"` on this root: `<symbol>` children are
       never part of the render tree on their own (only a `<use>` that
       references one actually draws anything) -- but some browsers'
       handling of *externally*-referenced (cross-document) `<use
       href="icons.svg#id">` treats a hidden root's cascade as applying
       to the fetched fragment too, silently rendering nothing. Confirmed
       by testing: removing this fixed icons not appearing in Chromium
       even though the DOM/`<use>` wiring was otherwise correct. -->
  <defs>
    <!-- Phase D1 icon sprite: every icon is a 24x24 stroke glyph
         (stroke-width 2, round caps/joins, currentColor, no fill) so it
         inherits text color and sizes cleanly at any resolution -- used
         everywhere an emoji glyph used to stand in for a tool/action.
         Referenced as <svg class="icon"><use href="/static/icons.svg#icon-NAME"/></svg>. -->
    <g id="__icon-defaults" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></g>
  </defs>

  <symbol id="icon-pen" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 4l6 6-9.5 9.5L4 21l1.5-6.5z"/>
      <line x1="12" y1="6" x2="18" y2="12"/>
    </g>
  </symbol>

  <symbol id="icon-cursor" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3l6 17 2-7 7-2z"/>
    </g>
  </symbol>

  <symbol id="icon-polygon" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l8 6-3 9H7L4 9z"/>
    </g>
  </symbol>

  <symbol id="icon-constrain" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="7" r="2.5"/>
      <circle cx="18" cy="17" r="2.5"/>
      <line x1="8.2" y1="8.8" x2="15.8" y2="15.2"/>
    </g>
  </symbol>

  <symbol id="icon-line" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="19" x2="19" y2="5"/>
      <circle cx="5" cy="19" r="1.6" fill="currentColor" stroke="none"/>
      <circle cx="19" cy="5" r="1.6" fill="currentColor" stroke="none"/>
    </g>
  </symbol>

  <symbol id="icon-rect" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="6" width="16" height="12" rx="1.5"/>
    </g>
  </symbol>

  <symbol id="icon-circle" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8"/>
    </g>
  </symbol>

  <symbol id="icon-ellipse" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="12" rx="9" ry="6"/>
    </g>
  </symbol>

  <symbol id="icon-arc" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 18A14 14 0 0 1 18 4"/>
    </g>
  </symbol>

  <symbol id="icon-ruler" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="9" width="18" height="6" rx="1" transform="rotate(-20 12 12)"/>
      <line x1="8.3" y1="9.3" x2="9.6" y2="11.6" transform="rotate(-20 12 12)"/>
      <line x1="11.7" y1="8.3" x2="13" y2="10.6" transform="rotate(-20 12 12)"/>
      <line x1="15.1" y1="7.3" x2="16.4" y2="9.6" transform="rotate(-20 12 12)"/>
    </g>
  </symbol>

  <symbol id="icon-dimension" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="4" y2="18"/>
      <line x1="20" y1="6" x2="20" y2="18"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <path d="M8 9l-4 3 4 3"/>
      <path d="M16 9l4 3-4 3"/>
    </g>
  </symbol>

  <symbol id="icon-text" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="5,7 5,5 19,5 19,7"/>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="9" y1="19" x2="15" y2="19"/>
    </g>
  </symbol>

  <symbol id="icon-undo" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 11H16a5 5 0 0 1 0 10h-2"/>
      <polyline points="11,6 6,11 11,16"/>
    </g>
  </symbol>

  <symbol id="icon-redo" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 11H8a5 5 0 0 0 0 10h2"/>
      <polyline points="13,6 18,11 13,16"/>
    </g>
  </symbol>

  <symbol id="icon-maximize" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9,4 4,4 4,9"/>
      <polyline points="15,4 20,4 20,9"/>
      <polyline points="4,15 4,20 9,20"/>
      <polyline points="20,15 20,20 15,20"/>
    </g>
  </symbol>

  <symbol id="icon-magnet" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 4v8a6 6 0 0 0 12 0V4"/>
      <line x1="6" y1="4" x2="10" y2="4"/>
      <line x1="14" y1="4" x2="18" y2="4"/>
      <line x1="6" y1="9" x2="10" y2="9"/>
      <line x1="14" y1="9" x2="18" y2="9"/>
    </g>
  </symbol>

  <symbol id="icon-save" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 4h11l3 3v13H5z"/>
      <rect x="8" y="4" width="7" height="5"/>
      <rect x="7" y="14" width="10" height="6"/>
    </g>
  </symbol>

  <symbol id="icon-upload" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="4" x2="12" y2="15"/>
      <polyline points="7,9 12,4 17,9"/>
      <path d="M5 16v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"/>
    </g>
  </symbol>

  <symbol id="icon-home" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 11l8-7 8 7"/>
      <path d="M6 10v9h12v-9"/>
      <line x1="10" y1="19" x2="10" y2="14"/>
      <line x1="14" y1="19" x2="14" y2="14"/>
    </g>
  </symbol>

  <symbol id="icon-link" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 15a4 4 0 0 0 6 0l3-3a4 4 0 0 0-6-6l-1.5 1.5"/>
      <path d="M15 9a4 4 0 0 0-6 0l-3 3a4 4 0 0 0 6 6l1.5-1.5"/>
    </g>
  </symbol>

  <symbol id="icon-eye" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
      <circle cx="12" cy="12" r="3"/>
    </g>
  </symbol>

  <symbol id="icon-eye-off" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 3l18 18"/>
      <path d="M10.6 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-4 4.9M6.5 6.7C3.7 8.6 2 12 2 12s3.5 7 10 7a9.7 9.7 0 0 0 4-.8"/>
      <path d="M9.5 9.6a3 3 0 0 0 4.2 4.2"/>
    </g>
  </symbol>

  <symbol id="icon-x" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="5" x2="19" y2="19"/>
      <line x1="19" y1="5" x2="5" y2="19"/>
    </g>
  </symbol>

  <symbol id="icon-vertex" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8"/>
      <line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </g>
  </symbol>

  <symbol id="icon-triangle" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 4l9 16H3z"/>
    </g>
  </symbol>

  <symbol id="icon-pyramid" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l9 15H3z"/>
      <path d="M12 3l0 15"/>
      <path d="M12 3l-5 9M12 3l5 9"/>
    </g>
  </symbol>

  <symbol id="icon-box" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/>
      <path d="M4 7.5l8 4.5 8-4.5"/>
      <line x1="12" y1="12" x2="12" y2="21"/>
    </g>
  </symbol>

  <symbol id="icon-cylinder" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="6" rx="8" ry="3"/>
      <path d="M4 6v12a8 3 0 0 0 16 0V6"/>
    </g>
  </symbol>

  <symbol id="icon-plane" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12l10-6 10 6-10 6z"/>
    </g>
  </symbol>

  <symbol id="icon-sparkles" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v4M12 17v4M3 12h4M17 12h4"/>
      <path d="M6.5 6.5l2 2M15.5 15.5l2 2M17.5 6.5l-2 2M8.5 15.5l-2 2"/>
    </g>
  </symbol>

  <symbol id="icon-warning" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l10 18H2z"/>
      <line x1="12" y1="10" x2="12" y2="14"/>
      <circle cx="12" cy="17.3" r="0.9" fill="currentColor" stroke="none"/>
    </g>
  </symbol>

  <symbol id="icon-file" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h9l5 5v13H6z"/>
      <polyline points="15,3 15,8 20,8"/>
    </g>
  </symbol>

  <symbol id="icon-chevron-right" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9,4 17,12 9,20"/>
    </g>
  </symbol>

  <symbol id="icon-chevron-left" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15,4 7,12 15,20"/>
    </g>
  </symbol>

  <symbol id="icon-clock" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <polyline points="12,7 12,12 16,14"/>
    </g>
  </symbol>

  <symbol id="icon-search" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21"/>
    </g>
  </symbol>

  <symbol id="icon-sun" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4.5"/>
      <line x1="12" y1="2" x2="12" y2="4.5"/>
      <line x1="12" y1="19.5" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="4.5" y2="12"/>
      <line x1="19.5" y1="12" x2="22" y2="12"/>
      <line x1="4.9" y1="4.9" x2="6.6" y2="6.6"/>
      <line x1="17.4" y1="17.4" x2="19.1" y2="19.1"/>
      <line x1="4.9" y1="19.1" x2="6.6" y2="17.4"/>
      <line x1="17.4" y1="6.6" x2="19.1" y2="4.9"/>
    </g>
  </symbol>

  <symbol id="icon-moon" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5z"/>
    </g>
  </symbol>

  <symbol id="icon-plus" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </g>
  </symbol>

  <symbol id="icon-plug-off" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 8V4M15 8V4"/>
      <path d="M7 8h10v4a5 5 0 0 1-10 0z"/>
      <line x1="12" y1="16" x2="12" y2="21"/>
      <line x1="3" y1="3" x2="21" y2="21"/>
    </g>
  </symbol>

  <!-- align/distribute (2D selection panel): a guide line + a small
       rect flush against it, on the relevant edge/center. -->
  <symbol id="icon-align-left" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="3" x2="4" y2="21"/>
      <rect x="4" y="6" width="8" height="5"/>
      <rect x="4" y="14" width="14" height="5"/>
    </g>
  </symbol>

  <symbol id="icon-align-h-center" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="3" x2="12" y2="21"/>
      <rect x="8" y="6" width="8" height="5"/>
      <rect x="5" y="14" width="14" height="5"/>
    </g>
  </symbol>

  <symbol id="icon-align-right" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="20" y1="3" x2="20" y2="21"/>
      <rect x="12" y="6" width="8" height="5"/>
      <rect x="6" y="14" width="14" height="5"/>
    </g>
  </symbol>

  <symbol id="icon-align-top" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="4" x2="21" y2="4"/>
      <rect x="6" y="4" width="5" height="8"/>
      <rect x="14" y="4" width="5" height="14"/>
    </g>
  </symbol>

  <symbol id="icon-align-v-center" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <rect x="6" y="8" width="5" height="8"/>
      <rect x="14" y="5" width="5" height="14"/>
    </g>
  </symbol>

  <symbol id="icon-align-bottom" viewBox="0 0 24 24">
    <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="20" x2="21" y2="20"/>
      <rect x="6" y="12" width="5" height="8"/>
      <rect x="14" y="6" width="5" height="14"/>
    </g>
  </symbol>
</svg>
