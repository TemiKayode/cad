<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>crdt-cad — Workspace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <script>
    // Anti-FOUC -- see the identical block in index.html for why this is
    // inline/synchronous rather than living in common.js.
    (function () {
      var stored = localStorage.getItem("crdt_cad_theme");
      var theme = stored || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/tokens.css" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="home-body">
  <div class="home-topbar">
    <div class="brand">crdt-cad workspace</div>
    <div class="spacer"></div>
    <button id="newDrawingBtn"><svg class="icon"><use href="#icon-pen"></use></svg>New 2D drawing</button>
    <button id="newMeshBtn"><svg class="icon"><use href="#icon-box"></use></svg>New 3D mesh</button>
    <button id="themeToggleBtn" class="ghost-btn" title="Toggle theme" aria-label="Toggle theme" style="border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 8px"></button>
  </div>

  <div class="home-main">
    <div id="roomGrid" class="room-grid"></div>
    <div id="emptyState" class="empty-hint" style="display:none;padding:24px 4px;">
      No rooms yet -- click "New 2D drawing" or "New 3D mesh" above to create one.
    </div>
  </div>

  <div id="historyModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span id="historyModalTitle">Version history</span>
        <button id="historyModalClose" class="ghost-btn" title="Close" aria-label="Close"><svg class="icon"><use href="#icon-x"></use></svg></button>
      </div>
      <div id="historyModalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="renameModal" class="modal-overlay" style="display:none">
    <div class="modal modal-narrow">
      <div class="modal-header">
        <span>Rename room</span>
        <button id="renameModalClose" class="ghost-btn" title="Close" aria-label="Close"><svg class="icon"><use href="#icon-x"></use></svg></button>
      </div>
      <div class="modal-body">
        <input id="renameInput" type="text" style="width:100%" />
        <div class="tool-row" style="margin-top:10px;justify-content:flex-end">
          <button id="renameCancelBtn">Cancel</button>
          <button id="renameSaveBtn" class="primary-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/home.js"></script>
</body>
</html>
